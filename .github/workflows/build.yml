name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Download Gradle wrapper jar
        run: |
          mkdir -p gradle/wrapper
          curl -o gradle/wrapper/gradle-wrapper.jar \
            https://raw.githubusercontent.com/gradle/gradle/v8.4.0/gradle/wrapper/gradle-wrapper.jar

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Download VOSK Hebrew model
        run: |
          mkdir -p app/src/main/assets/vosk-model-small
          cd app/src/main/assets/vosk-model-small
          curl -L -o model.zip https://alphacephei.com/vosk/models/vosk-model-small-en-us-0.15.zip
          unzip model.zip
          mv vosk-model-small-en-us-0.15/* .
          rm -rf vosk-model-small-en-us-0.15 model.zip

      - name: Inject Groq API Key
        run: |
          sed -i 's|YOUR_GROQ_API_KEY_HERE|${{ secrets.GROQ_API_KEY }}|g' app/build.gradle.kts

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Kai-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
