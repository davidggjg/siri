name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Remove duplicate service files
        run: |
          rm -f app/src/main/java/com/groqvoice/assistant/service/BootReceiver.kt
          rm -f app/src/main/java/com/groqvoice/assistant/service/KaiInteractionService.kt
          rm -f app/src/main/java/com/groqvoice/assistant/service/KaiSessionService.kt
          echo "Remaining service files:"
          ls app/src/main/java/com/groqvoice/assistant/service/

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Download Gradle wrapper jar
        run: |
          mkdir -p gradle/wrapper
          curl -o gradle/wrapper/gradle-wrapper.jar \
            https://raw.githubusercontent.com/gradle/gradle/v8.4.0/gradle/wrapper/gradle-wrapper.jar

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Inject Groq API Key
        run: |
          sed -i 's|YOUR_GROQ_API_KEY_HERE|${{ secrets.GROQ_API_KEY }}|g' app/build.gradle.kts

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Kai-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
